spring:
  application:
    name: wallet-radar
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/walletradar}

# Unified per-network ingestion config (ADR-012). Batch size semantics: ADR-011.
walletradar:
  ingestion:
    # Backfill window (T-009): blocks from current block. Default calibrated from live chain data
    # to cover approximately 2 years from 2024-03-08 with ~5% safety margin.
    backfill:
      window-blocks: 5500000
      segments:
        defaults:
          segment-stale-after-ms: 180000
          parallel-segments: 2
          parallel-segment-workers: 2
        by-rpc:
          segment-stale-after-ms: 120000
          parallel-segments: 424
          parallel-segment-workers: 6
      worker-threads: 4
      progress-update-interval-ms: 2000
      max-retries: 5
      retry-base-delay-minutes: 2
      retry-max-delay-minutes: 60
      retry-scheduler-interval-ms: 120000
      reclassify-schedule-interval-ms: 300000
    evm-rpc:
      max-requests-per-second: 1000
      endpoint-cooldown-ms: 3000
      transient-error-cooldown-ms: 15000
      batch-unsupported-cooldown-ms: 300000
      local-limiter-log-threshold-ms: 1000
      local-limiter-timeout-ms: 2000
    explorer:
      max-response-bytes: 16777216
      max-pages-per-window: 10000
      max-attempts: 5
      base-delay-ms: 1000
      jitter-factor: 0.2
      request-timeout-ms: 15000
    network:
      # If backfill fails with "RPC failed after 5 attempts", public RPCs may be rate-limiting. Try: reduce batch-block-size (e.g. 500), or add a paid RPC URL (Alchemy/Infura) first in urls.
      # avg-block-time-seconds: fallback for EstimatingBlockTimestampResolver when calibration
      # anchor points are the same block (single-block range). During normal backfill the resolver
      # computes actual avg block time from two RPC anchor calls.
      ETHEREUM:
        syncMethod: ETHERSCAN
        chain-id: "1"
        explorer:
          etherscan:
            base-url: https://api.etherscan.io
            api-key: ${ETHEREUM_ETHERSCAN_API_KEY:}
        urls:
          - https://rpc.ankr.com/eth/${ANKR_API_KEY:}
          - https://lb.drpc.live/ethereum/${DRPC_API_KEY:}
          - https://eth.llamarpc.com
          - https://cloudflare-eth.com
        batch-block-size: 10000
        window-blocks: 5500000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 12.0
      ARBITRUM:
        syncMethod: ETHERSCAN
        chain-id: "42161"
        explorer:
          etherscan:
            base-url: https://api.arbiscan.io
            api-key: ${ARBITRUM_ETHERSCAN_API_KEY:}
        urls:
          - https://arb1.arbitrum.io/rpc
          - https://rpc.sentio.xyz/arbitrum-one
          - https://arbitrum.api.onfinality.io/public
          - https://arbitrum-one-rpc.publicnode.com
          - https://arbitrum.blockpi.network/v1/rpc/public
          - https://arbitrum.meowrpc.com
#          - https://rpc.ankr.com/arbitrum/${ANKR_API_KEY:}
          - https://lb.drpc.live/arbitrum/${DRPC_API_KEY:}
        batch-block-size: 500
        window-blocks: 252000000   # ~2 years at ~4 blocks/s
        avg-block-time-seconds: 0.25
      OPTIMISM:
        syncMethod: BLOCKSCOUT
        chain-id: "10"
        explorer:
          blockscout:
            base-url: https://explorer.optimism.io
            api-key: ${OPTIMISM_BLOCKSCOUT_API_KEY:}
        urls:
          - https://rpc.ankr.com/optimism/${ANKR_API_KEY:}
          - https://lb.drpc.live/optimism/${DRPC_API_KEY:}
          - https://mainnet.optimism.io
          - https://optimism.drpc.org
        batch-block-size: 1000
        window-blocks: 34000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      POLYGON:
        syncMethod: ETHERSCAN
        chain-id: "137"
        explorer:
          etherscan:
            base-url: https://api.polygonscan.com
            api-key: ${POLYGON_ETHERSCAN_API_KEY:}
        urls:
          - https://rpc.ankr.com/polygon/${ANKR_API_KEY:}
          - https://lb.drpc.live/polygon/${DRPC_API_KEY:}
          - https://polygon.drpc.org
          - https://polygon-rpc.com
        batch-block-size: 1000
        window-blocks: 32000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      BASE:
        syncMethod: BLOCKSCOUT
        chain-id: "8453"
        explorer:
          blockscout:
            base-url: https://base.blockscout.com
            api-key: ${BASE_BLOCKSCOUT_API_KEY:}
        urls:
          - https://rpc.ankr.com/base/${ANKR_API_KEY:}
          - https://lb.drpc.live/base/${DRPC_API_KEY:}
          - https://mainnet.base.org
          - https://base.llamarpc.com
        batch-block-size: 1000
        window-blocks: 34000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      # Some BSC public RPCs prune old blocks (e.g. "History has been pruned"); multiple endpoints improve retry.
      BSC:
        syncMethod: RPC
        chain-id: "56"
        urls:
#          - https://lb.drpc.live/bsc/${DRPC_API_KEY:}
          - https://rpc.ankr.com/bsc/${ANKR_API_KEY:}
        batch-block-size: 500
        window-blocks: 52000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 0.5
      AVALANCHE:
        syncMethod: ETHERSCAN
        chain-id: "43114"
        explorer:
          etherscan:
            base-url: https://api.routescan.io/v2/network/mainnet/evm/43114/etherscan
            api-key: ${AVALANCHE_ETHERSCAN_API_KEY:}
        urls:
          - https://rpc.ankr.com/avalanche/${ANKR_API_KEY:}
          - https://lb.drpc.live/avalanche/${DRPC_API_KEY:}
          - https://api.avax.network/ext/bc/C/rpc
          - https://avax.meowrpc.com
        batch-block-size: 1000
        window-blocks: 40000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      MANTLE:
        syncMethod: ETHERSCAN
        chain-id: "5000"
        explorer:
          etherscan:
            base-url: https://api.mantlescan.xyz
            api-key: ${MANTLE_ETHERSCAN_API_KEY:}
        urls:
          - https://rpc.mantle.xyz
          - https://mantle.drpc.org
          - https://mantle-mainnet.public.blastapi.io
        batch-block-size: 1000
        window-blocks: 35000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      LINEA:
        syncMethod: ETHERSCAN
        chain-id: "59144"
        explorer:
          etherscan:
            base-url: https://api.etherscan.io
            api-key: ${LINEA_ETHERSCAN_API_KEY:}
        urls:
          - https://rpc.linea.build
          - https://linea-rpc.publicnode.com
        batch-block-size: 1000
        window-blocks: 29000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      UNICHAIN:
        syncMethod: ETHERSCAN
        chain-id: "130"
        one-leg-lend-rules:
          - contract: "0x2c7118c4c88b9841fcf839074c26ae8f035f2921"
            selectors:
              - "0xf2b9fdb8"
        explorer:
          etherscan:
            base-url: https://api.etherscan.io
            api-key: ${UNICHAIN_ETHERSCAN_API_KEY:}
        urls:
          - https://mainnet.unichain.org
          - https://unichain-rpc.publicnode.com
        batch-block-size: 1000
        window-blocks: 45000000    # full current chain age +5% safety; chain is younger than 2y
        avg-block-time-seconds: 2.0
      ZKSYNC:
        syncMethod: BLOCKSCOUT
        chain-id: "324"
        synthetic-native-contracts:
          - "0x000000000000000000000000000000000000800a"
        explorer:
          blockscout:
            base-url: https://zksync.blockscout.com
            api-key: ${ZKSYNC_BLOCKSCOUT_API_KEY:}
        urls:
          - https://mainnet.era.zksync.io
          - https://zksync.drpc.org
        batch-block-size: 1000
        window-blocks: 43000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 1.0
      SOLANA:
        syncMethod: RPC
        urls:
          - https://api.mainnet-beta.solana.com
    solana:
      # Max signatures per getSignaturesForAddress call (1-1000). Rate/batch limit.
      signatures-limit: 1000
    # RPC retry: exponential backoff ± jitter. Defaults: base-delay-ms=1000, jitter-factor=0.2, max-attempts=5
    retry:
      base-delay-ms: 2000
      # jitter-factor: 0.2
      max-attempts: 7
    # Classifier job (ADR-021): batch size and schedule for PENDING raw processing.
    classifier:
      batch-size: 1000
      schedule-interval-ms: 90000
      receipt-enrichment-threshold: 0.85
      needs-review-threshold: 0.60
      receipt-enrichment-max-attempts: 3
      receipt-enrichment-base-delay-ms: 1000
      receipt-enrichment-jitter-factor: 0.2
    # Clarification stage for normalized transactions (PENDING_CLARIFICATION).
    clarification:
      schedule-interval-ms: 120000
      max-retries: 10
    # Pricing stage for normalized transactions (PENDING_PRICE).
    normalized-pricing:
      schedule-interval-ms: 120000
      max-retries: 1000
    # Final consistency stage for normalized transactions (PENDING_STAT).
    normalized-stat:
      schedule-interval-ms: 120000
    # Periodic on-chain balance refresh for all known wallet×network pairs.
    balance:
      poll-interval-ms: 600000
    # Protocol display name by contract address (EVM) or program id (Solana). Keys lowercase.
    protocol-registry:
      names:  # address (EVM) or program id (Solana) -> display name; lookup is case-insensitive
        "0x7a250d5630b4cf539739df2c5dacb4c659f2488d": "Uniswap V2"
        "0x68b3465833fb72a70ecdf485e0e4c7bd8665fc45": "Uniswap V3"
        "0xe592427a0aece92de3edee1f18e0157c05861564": "Uniswap V3"
        "0xc36442b4a4522e871399cd717abdd847ab11fe88": "Uniswap V3"
        "0x943e6e07a7e8e791dafc44083e54041d743c46e9": "Uniswap V3"
        "0x4529a01c7a0410167c5740c487a8de60232617bf": "Uniswap V4"
        "0x1f98400000000000000000000000000000000004": "Uniswap V4"
        "0x55f4c8aba71a1e923edc303eb4feff14608cc226": "Pancake Infinity"
        "0x46a15b0b27311cedf172ab29e4f4766fbe7f4364": "PancakeSwap V3"
        "0xa815e2ed7f7d5b0c49fda367f249232a1b9d2883": "PancakeSwap V3"
        "0xc6a2db661d5a5690172d8eb0a7dea2d3008665a3": "PancakeSwap V3"
        "0x827922686190790b37229fd06084350e74485b72": "Aerodrome"
        "0x416b433906b1b72fa758e166e239c43d68dc6f29": "Velodrome Slipstream"
        "0x991d5546c4b442b4c5fdc4c8b8b8d131deb24702": "Slipstream"
        "0x87870bca3f3fd6335c3f4ce8392d69350b4fa4e2": "Aave V3"
  # Pricing: historical and spot resolvers (CoinGecko free API). T-019, T-020, T-012.
  pricing:
    coingecko-base-url: https://api.coingecko.com/api/v3
    coingecko-api-key: ${COINGECKO_API_KEY:}
    coingecko-api-key-header: ${COINGECKO_API_KEY_HEADER:x-cg-demo-api-key}
    coingecko-historical-requests-per-minute: 45
    connect-timeout-seconds: 10
    read-timeout-seconds: 15
    # Dynamic contract-to-CoinGecko-ID mapping (ADR-022). Config overrides take precedence.
    contract-mapping:
      enabled: true
      coins-list-cache-ttl-hours: 24
      coins-list-max-buffer-bytes: 8388608
      preload-bundled-index: true
      bundled-index-resource-path: classpath:/pricing/coingecko-platform-contract-index.json
      onchain-fallback-enabled: false   # MVP: skip onchain API; use coins/list + overrides only
    historical-fallback:
      enabled: true
      max-demo-lookback-days: 365
      resource-path: classpath:/pricing/missing-price-requests-older-300d-priced.json
    # Token contract address (lowercase) -> CoinGecko coin id (config override; network-agnostic)
    contract-to-coin-gecko-id:
      "0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2": "weth"
      "0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee": "ethereum"
      # ARB (Arbitrum), MORPHO (Morpho) - avoid wrong fallback to ETH price
      "0x912ce59144191c1204e64559fe8253a0e49e6548": "arbitrum"
      "0x40bd670a58238e6e230c430bbb5ce6ec0d40df48": "morpho"
      # Native token wrapped addresses for gas cost pricing (FIX-C2)
      "0x0d500b1d8e8ef31e21c99d1db9a6444d3adf1270": "matic-network"
      "0xbb4cdb9cbd36b01bd1cbaebf2de08d9173bc095c": "binancecoin"
      "0xb31f66aa3c1e785363f0875a1b74e27b85fd66c7": "avalanche-2"
      "0x78c1b0c915c4faa5fffa6cabf0219da63d7f4cb8": "mantle"
      "So11111111111111111111111111111111111111112": "solana"
  # Phishing/scam filter: skip ingestion of txs involving blocklisted addresses (contracts, EOAs).
  scam-filter:
    enabled: true
    drop-threshold: 100
    blocklist-score: 1000
    unsolicited-inbound-score: 35
    mass-airdrop-score: 90
    relay-sweep-score: 100
    inbound-fanout-score: 85
    zero-amount-poisoning-score: 95
    suspicious-multicall-airdrop-score: 100
    wallet-initiated-credit: 60
    mixed-wallet-flow-credit: 30
    wallet-approval-credit: 20
    mass-airdrop-min-transfer-logs: 20
    mass-relay-spam-min-transfer-logs: 30
    mass-inbound-fanout-min-recipients: 40
    zero-amount-poisoning-min-transfer-logs: 100
    zero-amount-poisoning-min-zero-transfers: 20
    suspicious-multicall-airdrop-min-transfer-calls: 20
    known-inbound-spam-fingerprints:
