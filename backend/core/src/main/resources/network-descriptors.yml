          contract: "0x6100e367285b01f48d07953803a2d8dca5d19873"
          symbol: WXPL
        wallet-supported: true
        evm-wallet-supported: true
        usd-stable-contracts:
          - "0xb8ce59fc3717ada4c02eadf9682a9e934f625ebb"
        token-overrides:
          # Plasma USDT0 (builder ERC-20 evidence decoding fallback).
          "0xb8ce59fc3717ada4c02eadf9682a9e934f625ebb": { symbol: "USDT0", decimals: 6 }
      SOLANA:
        address-format: SOLANA
        native-symbol: SOL
        # Accounting identity sentinel stamped on native SOL flows by SolanaNormalizedTransactionBuilder
        # and used by balance/lending/pricing readers as the canonical contract for native SOL.
        native-identity: "NATIVE:SOLANA"
        native-decimals: 9
        # Wrapped SOL (wSOL) SPL mint — accounting-identical to native SOL (wrap/unwrap has no basis impact).
        # NOTE: base-58 is case-sensitive. NetworkRegistry preserves exact case for non-EVM (non-0x)
        # contracts (W16). Consumers must compare wSOL with the case-preserved mint address.
        wrapped-native:
          contract: "So11111111111111111111111111111111111111112"
          symbol: WSOL
        wallet-supported: true
        evm-wallet-supported: false
        usd-stable-contracts:
          - "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"  # USDC (SPL)
          - "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB"  # USDT (SPL)
        # SPL majors seeded because Helius frequently omits symbol/decimals on parsed payloads.
        # base58 is case-sensitive → keys are matched exactly (never lowercased).
        token-overrides:
          "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v": { symbol: "USDC", decimals: 6 }
          "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB": { symbol: "USDT", decimals: 6 }
          "So11111111111111111111111111111111111111112": { symbol: "SOL", decimals: 9 }
      TON:
        address-format: TON
        wallet-supported: true
        evm-wallet-supported: false
        native-symbol: TON
        # Accounting identity sentinel stamped on native TON flows by TonNormalizedTransactionBuilder
        # and used by balance/pricing readers as the canonical contract for native TON.
        native-identity: "TONCOIN"
        native-decimals: 9
        usd-stable-contracts:
          - "EQCxE6mUtQJKFnGfaROTKOt1lZbDiiX1kCixRv7Nw2Id_sDs"  # USD₮ (Tether jetton master, TON)
        # Jetton masters keyed in any canonical form (friendly EQ…/UQ… or raw workchain:hex);
        # TonAddressCanonicalizer resolves cross-form matches (keys are NOT lowercased). Load-bearing
        # decimals only — RWA/xStock symbols now resolve live via the TON jetton metadata resolver.
        token-overrides:
          "EQCxE6mUtQJKFnGfaROTKOt1lZbDiiX1kCixRv7Nw2Id_sDs": { symbol: "USDT", decimals: 6 }  # USDT-TON
          "0:ad0f6fbbab11e1428361c6b8b6252cc7f9d9665aa298083b65119a918b7fb9ea": { decimals: 8 }  # AMZNx (xStock)
          "0:5bb0b607e6c0fbe2060ee033a88f442c1da34bf3534b0f5dc07619260f4529fb": { decimals: 8 }  # MSTRx (xStock)
          "0:3547f2ee4022c794c80ea354b81bb63b5b571dd05ac091b035d19abbadd74ac6": { decimals: 6 }  # XAUT0 (RWA gold)
