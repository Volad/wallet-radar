# Track A / A5 — per-network metadata (imported from application.yml).
#
# token-overrides (WS-7): single source of truth for the irreducible per-network token identity
# overrides that replaced the retired token-metadata.json. Resolution order everywhere metadata is
# resolved at NORMALIZATION is: descriptor override (this map) → persistent token_metadata_cache →
# live resolver (write-through) → explicit unresolved. Each entry may carry:
#   symbol          fallback/seed symbol (used when the source payload omits one);
#   decimals        fallback/seed decimals (used when the source omits them);
#   decimal-override authoritative decimals that ALWAYS replace a known-wrong source value.
# Only load-bearing decimals (qty = raw / 10^decimals feeds AVCO) and explorer-misreport overrides
# are kept; redundant symbol-only entries are dropped since live RPC/resolvers + stables cover them.
walletradar:
  networks:
    entries:
      ETHEREUM:
        address-format: EVM
        native-symbol: ETH
        native-decimals: 18
        wrapped-native:
          contract: "0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2"
          symbol: WETH
        wallet-supported: true
        evm-wallet-supported: true
        usd-stable-contracts:
          - "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48"
          - "0xdac17f958d2ee523a2206206994597c13d831ec7"
          - "0x6b175474e89094c44da98b954eedeac495271d0f"
          - "0xc5f0f7b66764f6ec8c8dff7ba683102295e16409"
          - "0x4c9edd5852cd905f086c759e8383e09bff1e68b3"
        token-overrides:
          # Euler v2 eUSDC-2 vault share (fallback symbol/decimals when the explorer omits them).
          "0x39de0f00189306062d79edec6dca5bb6bfd108f9": { symbol: "eUSDC-2", decimals: 6 }
          # Resolv wstUSR (builder ERC-20 evidence decoding fallback).
          "0x2a52b289ba68bbd02676640aa9f605700c9e5699": { symbol: "wstUSR", decimals: 18 }
      ARBITRUM:
        address-format: EVM
        native-symbol: ETH
        native-decimals: 18
        wrapped-native:
          contract: "0x82af49447d8a07e3bd95bd0d56f35241523fbab1"
          symbol: WETH
        wallet-supported: true
        evm-wallet-supported: true
        usd-stable-contracts:
          - "0xaf88d065e77c8cc2239327c5edb3a432268e5831"
          - "0xfd086bc7cd5c481dcc9c85ebe478a1c0b69fcbb9"
          - "0xda10009cbd5d07dd0cecc66161fc93d7c9000da1"
          - "0x5d3a1ff2b6bab83b63cd9ad0787074081a52ef34"
        token-overrides:
          # soUSDC "Silo Optima" — Etherscan misreports tokenDecimal=6; on-chain decimal is 12.
          # decimal-override ALWAYS replaces the wrong explorer value (financial correctness).
          "0x2514a2ce842705ead703d02fabfd8250bfcfb8bd": { symbol: "soUSDC", decimal-override: 12 }
          # Arbitrum native USDC + bridged USDC.e (builder ERC-20 evidence decoding fallback).
          "0xaf88d065e77c8cc2239327c5edb3a432268e5831": { symbol: "USDC", decimals: 6 }
          "0xff970a61a04b1ca14834a43f5de4533ebddb5cc8": { symbol: "USDC", decimals: 6 }
      OPTIMISM:
        address-format: EVM
        native-symbol: ETH
