        token-contract: 0x309aed2eebf9db4d7e51a7d2fdf557f7bbfe774a
        method-id: 0xbf3b75a3
      - network-id: UNICHAIN
        token-contract: 0xeb923667062ff90c633910894467819ddc2b701e
        method-id: 0x007b6643
      - network-id: UNICHAIN
        token-contract: 0x03a2dd6009c2f110aef74d1dd174a3e240122260
        method-id: 0x007b6643
      - network-id: ARBITRUM
        token-contract: 0x29103b9e35b3f5f65708804dcc5f945fae992416
        method-id: 0xd43a632f
  auth:
    # Set to true in prod to enforce Google OAuth2 login for all session APIs.
    # Keep false for local development without Google credentials.
    enabled: ${WALLETRADAR_AUTH_ENABLED:false}
    post-login-redirect: ${WALLETRADAR_AUTH_POST_LOGIN_REDIRECT:/settings}
    jwt:
      # HS256 secret — set WALLETRADAR_AUTH_JWT_SECRET in prod (openssl rand -base64 48).
      secret: ${WALLETRADAR_AUTH_JWT_SECRET:dev-insecure-secret-change-in-prod}
      expiration-seconds: 2592000  # 30 days
    cookie:
      name: wr_auth
      max-age-seconds: 2592000  # 30 days
      secure: true
      same-site: Lax
      path: /

  # API CORS policy for local SPA development and browser preflight (OPTIONS).
  api:
    cors:
      allowed-origins:
        - http://localhost:4200
        - http://127.0.0.1:4200
        - http://localhost:4206
        - http://127.0.0.1:4206
        - http://192.168.1.165:4300
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      max-age-seconds: 3600
