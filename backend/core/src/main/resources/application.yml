server:
  # Trust X-Forwarded-Proto/Host headers from Cloudflare → nginx reverse proxy.
  forward-headers-strategy: framework

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE

spring:
  config:
    import: optional:classpath:network-descriptors.yml
  application:
    name: wallet-radar
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/walletradar}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope:
              - openid
              - email
              - profile
            redirect-uri: ${WALLETRADAR_AUTH_REDIRECT_URI:https://wr.allatone.xyz/login/oauth2/code/google}

# Per-network ingestion config for raw backfill adapters.
walletradar:
  admin:
    # Set WR_ADMIN_INTEGRATION_REBUILD_TOKEN in prod; POST /api/v1/admin/integrations/{id}/full-rebuild requires X-WalletRadar-Admin-Token.
    integration-rebuild-token: ${WR_ADMIN_INTEGRATION_REBUILD_TOKEN:}
  integration:
    bybit:
      live-balance-refresh-interval-ms: 300000
  lending:
    market-rates:
      startup-refresh-enabled: true
      refresh-interval-ms: 18000000
      aave-v3:
        ARBITRUM:
          enabled: true
          pool-address: "0x794a61358d6845594f94dc1db02a252b5b4814ad"
          pool-addresses-provider: "0xa97684ead0e402dc232d5a977953df7ecbab3cdb"
          source: "protocol-registry+aave-pool-addresses-provider"
          version: "v3"
        AVALANCHE:
          enabled: true
          pool-address: "0x794a61358d6845594f94dc1db02a252b5b4814ad"
          pool-addresses-provider: "0xa97684ead0e402dc232d5a977953df7ecbab3cdb"
          source: "protocol-registry+aave-pool-addresses-provider"
          version: "v3"
        MANTLE:
          enabled: true
          pool-address: "0x458f293454fe0d67ec0655f3672301301dd51422"
          pool-addresses-provider: "0xba50cd2a20f6da35d788639e581bca8d0b5d4d5f"
          source: "protocol-registry+aave-pool-addresses-provider"
          version: "v3"
        BASE:
          enabled: true
          pool-address: "0xa238dd80c259a72e81d7e4664a9801593f98d1c5"
          pool-addresses-provider: "0xe20fcbdbff4dd086226b80fc4e8d85d67a43d894"
          source: "protocol-registry+aave-pool-addresses-provider"
          version: "v3"
    health-factor:
      refresh-interval-ms: 600000
  liquidity-pools:
    enabled: true
    refresh-interval-ms: 3600000
    on-demand-debounce-ms: 20000
    depth-interval-ms: 21600000  # pool liquidity histogram cache TTL (6h); position TVL/fees still refresh on demand
    stale-multiplier: 2
    dust-threshold-usd: 10
  ingestion:
    # Backfill window counted back from the current head.
    # Defaults are calibrated from live chain data with a small safety margin.
    backfill:
      window-blocks: 5500000
      segments:
        defaults:
          segment-stale-after-ms: 180000
          parallel-segments: 2
          parallel-segment-workers: 2
        by-rpc:
          segment-stale-after-ms: 120000
          parallel-segments: 6
          parallel-segment-workers: 6
      worker-threads: 4
      progress-update-interval-ms: 2000
      max-retries: 5
      retry-base-delay-minutes: 2
      retry-max-delay-minutes: 60
      retry-scheduler-interval-ms: 120000
    evm-rpc:
      max-requests-per-second: 1000
      endpoint-cooldown-ms: 3000
      transient-error-cooldown-ms: 15000
      batch-unsupported-cooldown-ms: 300000
      max-response-bytes: 16777216
      local-limiter-log-threshold-ms: 1000
      local-limiter-timeout-ms: 2000
    explorer:
      max-response-bytes: 16777216
      max-pages-per-window: 10000
      max-attempts: 5
      base-delay-ms: 1000
      jitter-factor: 0.2
      request-timeout-ms: 15000
    bybit:
      internal-transfer:
        bundle-window-seconds: 60
        bundle-residual-pct: 0.01
        bundle-min-members: 3
        roundtrip-window-days: 14
        roundtrip-tolerance-pct: 0.001
    network:
      # If backfill fails with "RPC failed after 5 attempts", public RPCs may be rate-limiting. Try: reduce batch-block-size (e.g. 500), or add a paid RPC URL (Alchemy/Infura) first in urls.
      # avg-block-time-seconds: fallback for EstimatingBlockTimestampResolver when calibration
      # anchor points are the same block (single-block range). During normal backfill the resolver
      # computes actual avg block time from two RPC anchor calls.
      ETHEREUM:
        syncMethod: ETHERSCAN
        chain-id: "1"
        explorer:
          etherscan:
            base-url: https://api.etherscan.io
            api-key: ${ETHEREUM_ETHERSCAN_API_KEY:}
        provider:
          enabled: true
          base-url: https://rpc.ankr.com/multichain/${ANKR_API_KEY:}
        urls:
          - https://rpc.ankr.com/eth/${ANKR_API_KEY:}
          - https://lb.drpc.live/ethereum/${DRPC_API_KEY:}
          - https://eth.llamarpc.com
          - https://cloudflare-eth.com
        batch-block-size: 10000
        window-blocks: 5500000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 12.0
      ARBITRUM:
        syncMethod: ETHERSCAN
        chain-id: "42161"
        explorer:
          etherscan:
            base-url: https://api.arbiscan.io
            api-key: ${ARBITRUM_ETHERSCAN_API_KEY:}
        provider:
          enabled: true
          base-url: https://rpc.ankr.com/multichain/${ANKR_API_KEY:}
        urls:
          - https://rpc.ankr.com/arbitrum/${ANKR_API_KEY:}
          - https://arb1.arbitrum.io/rpc
          - https://rpc.sentio.xyz/arbitrum-one
          - https://arbitrum.api.onfinality.io/public
          - https://arbitrum-one-rpc.publicnode.com
          - https://arbitrum.blockpi.network/v1/rpc/public
          - https://arbitrum.meowrpc.com
          - https://lb.drpc.live/arbitrum/${DRPC_API_KEY:}
        batch-block-size: 500
        window-blocks: 252000000   # ~2 years at ~4 blocks/s
        avg-block-time-seconds: 0.25
      OPTIMISM:
        syncMethod: BLOCKSCOUT
        chain-id: "10"
        explorer:
          blockscout:
            base-url: https://explorer.optimism.io
            api-key: ${OPTIMISM_BLOCKSCOUT_API_KEY:}
        provider:
          enabled: true
          base-url: https://rpc.ankr.com/multichain/${ANKR_API_KEY:}
        urls:
          - https://rpc.ankr.com/optimism/${ANKR_API_KEY:}
          - https://lb.drpc.live/optimism/${DRPC_API_KEY:}
          - https://mainnet.optimism.io
          - https://optimism.drpc.org
        batch-block-size: 1000
        window-blocks: 34000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      POLYGON:
        syncMethod: ETHERSCAN
        chain-id: "137"
        explorer:
          etherscan:
            # Etherscan V2 unified endpoint (chainid=137). The standalone api.polygonscan.com
            # API was deprecated and now returns HTML, which broke head-block + txlist resolution.
            base-url: https://api.etherscan.io
            api-key: ${POLYGON_ETHERSCAN_API_KEY:}
        provider:
          enabled: true
          base-url: https://rpc.ankr.com/multichain/${ANKR_API_KEY:}
        urls:
          - https://rpc.ankr.com/polygon/${ANKR_API_KEY:}
          - https://lb.drpc.live/polygon/${DRPC_API_KEY:}
          - https://polygon.drpc.org
          - https://polygon-rpc.com
        batch-block-size: 1000
        window-blocks: 32000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      BASE:
        syncMethod: BLOCKSCOUT
        chain-id: "8453"
        explorer:
          blockscout:
            base-url: https://base.blockscout.com
            api-key: ${BASE_BLOCKSCOUT_API_KEY:}
        provider:
          enabled: true
          base-url: https://rpc.ankr.com/multichain/${ANKR_API_KEY:}
        urls:
          - https://rpc.ankr.com/base/${ANKR_API_KEY:}
          - https://mainnet.base.org
          - https://1rpc.io/base
          - https://base-rpc.publicnode.com
          - https://lb.drpc.live/base/${DRPC_API_KEY:}
        batch-block-size: 1000
        window-blocks: 34000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      # Some BSC public RPCs prune old blocks (e.g. "History has been pruned"); multiple endpoints improve retry.
      BSC:
        syncMethod: RPC
        chain-id: "56"
        provider:
          enabled: true
          base-url: https://rpc.ankr.com/multichain/${ANKR_API_KEY:}
          page-size: 100
        urls:
          - https://bsc-dataseed.binance.org/
          - https://bsc-rpc.publicnode.com
          - https://rpc.ankr.com/bsc/${ANKR_API_KEY:}
          #          - https://lb.drpc.live/bsc/${DRPC_API_KEY:}
        batch-block-size: 250000
        window-blocks: 31500000    # tuned from earliest verified wallet tx at block 56,750,955 with ~0.53M safety from last known head
        avg-block-time-seconds: 0.5
      AVALANCHE:
        syncMethod: ETHERSCAN
        chain-id: "43114"
        explorer:
          etherscan:
            base-url: https://api.routescan.io/v2/network/mainnet/evm/43114/etherscan
            api-key: ${AVALANCHE_ETHERSCAN_API_KEY:}
        provider:
          enabled: true
          base-url: https://rpc.ankr.com/multichain/${ANKR_API_KEY:}
        urls:
          - https://rpc.ankr.com/avalanche/${ANKR_API_KEY:}
          - https://lb.drpc.live/avalanche/${DRPC_API_KEY:}
          - https://api.avax.network/ext/bc/C/rpc
          - https://avax.meowrpc.com
        batch-block-size: 1000
        window-blocks: 40000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      MANTLE:
        syncMethod: ETHERSCAN
        chain-id: "5000"
        explorer:
          etherscan:
            base-url: https://api.mantlescan.xyz
            api-key: ${MANTLE_ETHERSCAN_API_KEY:}
        urls:
          - https://rpc.mantle.xyz
          - https://mantle.drpc.org
          - https://mantle-mainnet.public.blastapi.io
        batch-block-size: 1000
        window-blocks: 35000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      LINEA:
        syncMethod: ETHERSCAN
        chain-id: "59144"
        explorer:
          etherscan:
            base-url: https://api.etherscan.io
            api-key: ${LINEA_ETHERSCAN_API_KEY:}
        provider:
          enabled: true
          base-url: https://rpc.ankr.com/multichain/${ANKR_API_KEY:}
        urls:
          - https://rpc.linea.build
          - https://linea-rpc.publicnode.com
        batch-block-size: 1000
        window-blocks: 29000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 2.0
      UNICHAIN:
        syncMethod: ETHERSCAN
        chain-id: "130"
        explorer:
          etherscan:
            base-url: https://api.etherscan.io
            api-key: ${UNICHAIN_ETHERSCAN_API_KEY:}
        urls:
          - https://mainnet.unichain.org
          - https://unichain-rpc.publicnode.com
        batch-block-size: 1000
        window-blocks: 45000000    # full current chain age +5% safety; chain is younger than 2y
        avg-block-time-seconds: 2.0
      KATANA:
        syncMethod: ETHERSCAN
        chain-id: "747474"
        explorer:
          etherscan:
            base-url: https://api.etherscan.io
            api-key: ${KATANA_ETHERSCAN_API_KEY:}
        urls:
          - https://rpc.katana.network/
        batch-block-size: 500
        window-blocks: 28500000    # full current chain age +5% safety as of 2026-03-18; chain is younger than 2y
        avg-block-time-seconds: 1.0
      PLASMA:
        syncMethod: ETHERSCAN
        chain-id: "9745"
        explorer:
          etherscan:
            base-url: https://api.etherscan.io
            api-key: ${PLASMA_ETHERSCAN_API_KEY:}
        urls:
          - https://rpc.plasma.to
        batch-block-size: 1000
        window-blocks: 17800000    # full current chain age +5% safety as of 2026-03-18; chain is younger than 2y
        avg-block-time-seconds: 1.0
      ZKSYNC:
        syncMethod: BLOCKSCOUT
        chain-id: "324"
        explorer:
          blockscout:
            base-url: https://zksync.blockscout.com
            api-key: ${ZKSYNC_BLOCKSCOUT_API_KEY:}
        urls:
          - https://mainnet.era.zksync.io
          - https://zksync.drpc.org
        batch-block-size: 1000
        window-blocks: 43000000    # measured ~2y span as of 2026-03-09, rounded +5%
        avg-block-time-seconds: 1.0
      SOLANA:
        syncMethod: RPC
        fullIndex: false
        urls:
          - https://api.mainnet-beta.solana.com
      TON:
        syncMethod: RPC
        fullIndex: false
        urls: []
    solana:
      # Max signatures per getSignaturesForAddress call (1-1000). Rate/batch limit.
      signatures-limit: 1000
    # RPC retry: exponential backoff ± jitter. Defaults: base-delay-ms=1000, jitter-factor=0.2, max-attempts=5
    retry:
      base-delay-ms: 2000
      # jitter-factor: 0.2
      max-attempts: 7
  normalization:
    on-chain:
      enabled: true
      batch-size: 250
      schedule-interval-ms: 90000
      retry-delay-seconds: 60
    bybit:
      enabled: true
      batch-size: 250
      schedule-interval-ms: 90000
    # ADR-044 D5: router-agnostic native-settlement recovery (D2) + clarification trigger (D3).
    # Defaults OFF; enable per-chain (empty `chains` = all EVM) after the reconciliation gate is
    # green on a clean rebuild for the affected chains.
    native-settlement-recovery:
      enabled: true
      chains: ["BASE"]
    clarification:
      enabled: true
      batch-size: 30
      threads: 2
      lease-seconds: 300
      retry-delay-seconds: 120
      max-attempts: 3
      li-fi-status:
        enabled: true
        base-url: https://li.quest
        timeout-ms: 5000
      mayan-status:
        enabled: true
        base-url: https://explorer-api.mayan.finance
        timeout-ms: 5000
      full-receipt:
        enabled: true
        batch-size: 50
        retry-delay-seconds: 300
        max-attempts: 2
      related-discovery:
        enabled: true
        forward-block-window: 750000
        max-pages: 3

  costbasis:
    enabled: true
    validation-batch-size: 250
    schedule-interval-ms: 120000
    retry-delay-seconds: 120
    # ADR-044 D4: native-pool reconciliation gate severity. WARN emits diagnostics; flip to
    # HARD_FAIL only after a clean rebuild reconciles every in-scope NATIVE:<chain> pool.
    native-pool-reconciliation:
      severity: WARN
  tools:
    classification-baseline:
      enabled: false
      mode: EXPORT
      output-dir: results/refactor-baseline/adr-001/manual
      baseline-dir:

  pricing:
    enabled: true
    bridge-out:
      upstream-lookback-hours: 24
    batch-size: 1000
    parallel-lanes: 4
    quote-resolve-parallel-lanes: 16
    schedule-interval-ms: 120000
    retry-delay-seconds: 120
    external:
      request-timeout-ms: 10000
      ecb:
        base-url: https://data-api.ecb.europa.eu
        backfill-days: 7
      bybit:
        base-url: https://api.bybit.com
      binance:
        base-url: https://api.binance.com
      coin-gecko:
        base-url: https://api.coingecko.com/api/v3
  scam-filter:
    enabled: true
    drop-threshold: 100
    blocklist-score: 1000
    unsolicited-inbound-score: 35
    mass-airdrop-score: 90
    relay-sweep-score: 100
    inbound-fanout-score: 85
    zero-amount-poisoning-score: 95
    suspicious-multicall-airdrop-score: 100
    wallet-initiated-credit: 60
    mixed-wallet-flow-credit: 30
    wallet-approval-credit: 20
    mass-airdrop-min-transfer-logs: 20
    mass-relay-spam-min-transfer-logs: 30
    mass-inbound-fanout-min-recipients: 40
    zero-amount-poisoning-min-transfer-logs: 100
    zero-amount-poisoning-min-zero-transfers: 20
    suspicious-multicall-airdrop-min-transfer-calls: 20
    known-inbound-spam-fingerprints:
      - network-id: BASE
        token-contract: 0xed7b04a3fdcc4b0718f76ab796d58f39212815cc
        method-id: 0x4bb9aaf9
